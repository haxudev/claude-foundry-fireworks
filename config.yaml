      api_base: os.environ/AZURE_FOUNDRY_ENDPOINT
      api_key: os.environ/AZURE_FOUNDRY_API_KEY
      drop_params: true

litellm_settings:
  drop_params: true
  callbacks: param_filter.proxy_handler_instance

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
